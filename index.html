<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KelasKu - Portal Guru</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%237c5cff'/%3E%3Ctext x='50' y='68' font-size='60' font-family='Arial' font-weight='bold' text-anchor='middle' fill='white'%3EK%3C/text%3E%3C/svg%3E" />
  <style>
    html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#eef2ff; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    #kk-frame { position:fixed; inset:0; width:100%; height:100%; border:0; }
    #kk-loading {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:18px;
      background:linear-gradient(135deg,#eef2ff,#f5edff); z-index:10;
      transition:opacity .4s ease; text-align:center; padding:24px;
    }
    #kk-loading.hide { opacity:0; pointer-events:none; }
    .kk-logo {
      width:76px; height:76px; border-radius:20px; background:#7c5cff;
      color:#fff; font-weight:800; font-size:42px; display:flex;
      align-items:center; justify-content:center;
      box-shadow:0 12px 30px -8px rgba(124,92,255,.6);
    }
    .kk-title { font-weight:800; font-size:20px; color:#3b2f7a; }
    .kk-sub { font-size:13px; color:#7b74a8; }
    .kk-spin {
      width:34px; height:34px; border:4px solid #d9d2ff;
      border-top-color:#7c5cff; border-radius:50%;
      animation:kkspin 1s linear infinite;
    }
    @keyframes kkspin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="kk-loading">
    <div class="kk-logo">K</div>
    <div class="kk-title">KelasKu</div>
    <div class="kk-sub">Memuat portal guru...</div>
    <div class="kk-spin"></div>
  </div>

  <iframe
    id="kk-frame"
    src="https://script.google.com/macros/s/AKfycbz7hKWH9VJRFYJ6koqKZmgz1CDcLWXgwmiLFQ4dMauSm_GH06AwZ2T-S8IjO_rFwqeY/exec"
    allow="clipboard-read; clipboard-write; fullscreen"
    allowfullscreen
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>

  <script>
    (function(){
      var frame = document.getElementById('kk-frame');
      var loader = document.getElementById('kk-loading');
      var hidden = false;
      function hideLoader(){
        if (hidden) return;
        hidden = true;
        if (loader) loader.classList.add('hide');
        setTimeout(function(){ if (loader && loader.parentNode) loader.parentNode.removeChild(loader); }, 500);
      }
      if (frame) frame.addEventListener('load', hideLoader);
      // Cadangan: sembunyikan loader setelah 8 detik walau event load tidak terpicu.
      setTimeout(hideLoader, 8000);
    })();
  </script>
</body>
</html>
